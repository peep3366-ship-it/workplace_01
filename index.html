  .detail-actions { display: flex; gap: 10px; padding: 4px 16px 16px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; border: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: #FDDDD5; color: #000; }
  .btn-naver { background: #C8F5DC; color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* ── 지도 팝업 ── */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 14px !important; color: var(--text) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
    font-family: 'Noto Sans KR', sans-serif !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; font-size: 13px !important; }
  .lp-name { font-weight: 700; font-size: 14px; color: var(--text); }
  .lp-cat-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; color: white; white-space: nowrap; flex-shrink: 0; }
  .lp-addr { color: var(--text-muted); font-size: 12px; margin-bottom: 10px; line-height: 1.5; }
  .lp-shift-text {
    font-size: 11px;
    color: #888;
    display: inline-block;
    vertical-align: middle;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 178px;
  }
  @media (max-width: 767px) {
    .lp-shift-text { max-width: 145px; }
  }
  .lp-btn {
    background: var(--primary); color: white; border: none; border-radius: 8px;
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
  }


  /* ── 같은 위치 사업장 선택 팝업 ── */
  .group-popup-title {
    font-weight: 800; font-size: 14px; color: var(--text); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .group-popup-sub {
    font-size: 11px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.4;
  }
  .group-store-card {
    width: 100%; text-align: left; cursor: pointer;
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 11px; margin-bottom: 8px; font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.12s, border-color 0.12s, transform 0.12s;
  }
  .group-store-card:active { transform: scale(0.99); background: var(--surface2); }
  .group-store-card.working { border-color: #BDE8CF; background: #F7FEFA; }
  .group-store-head { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
  .group-store-name { font-size:13px; font-weight:800; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .group-store-meta { font-size:11px; color:var(--text-muted); line-height:1.45; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .group-status { font-size:10px; font-weight:800; padding:2px 7px; border-radius:999px; white-space:nowrap; }
  .group-status.on { background:#E8F8EF; color:#059142; }
  .group-status.off { background:#F2F2F0; color:#999; }


  /* ── 필터 공통 ── */
  .filter-bar {
    position: fixed;
    z-index: 200;
    display: flex; gap: 4px; align-items: center;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    height: 32px;
    padding: 0 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }
  /* ── 상태 범례 ── */


  /* 필터 + 범례: 좌측 정렬, 위아래 배치 */
  .cat-filter {
    top: calc(var(--safe-top) + 79px);
    bottom: auto;
    left: calc(365px + 15px);
    transform: none;
  }
  /* 범례: 구분필터 아래 15pt */
  .status-legend {
    position: fixed;
    top: calc(var(--safe-top) + 122px);
    bottom: auto;
    left: calc(365px + 15px);
    transform: none;
    z-index: 250;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.96);
    border: 1px solid var(--border);
    border-radius: 10px;
    height: 32px;
    padding: 0 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    backdrop-filter: blur(8px);
    font-size: 11px; color: var(--text-muted);
    font-weight: 700;
    white-space: nowrap;
    pointer-events: none;
  }

  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; color: var(--text-muted); }
  /* 모바일 */
  @media (max-width: 767px) {
    .cat-filter     { left: 8px; top: calc(var(--safe-top) + 79px); transform: none; bottom: auto; }
    .status-legend  { left: 8px; top: calc(var(--safe-top) + 122px); transform: none; bottom: auto; }
  }
  .cat-filter-btn {
    display: flex; align-items: center; gap: 4px;
    height: 24px; padding: 0 9px; border-radius: 6px;
    border: 1.5px solid transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 700;
    cursor: pointer; background: transparent;
    color: var(--text-muted); font-weight: 700; transition: all 0.15s; white-space: nowrap;
  }
  .cat-filter-btn:active { opacity: 0.7; }
  .cat-filter-btn.active { color: white; }
  .filter-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .filter-sep { color: var(--text-muted); opacity:0.35; font-size: 13px; padding: 0 2px; user-select: none; pointer-events: none; flex-shrink: 0; }
  .filter-sep-label { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 0 2px; user-select: none; pointer-events: none; flex-shrink: 0; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }


  .cat-filter-btn[data-cat="전체"].active    { background:#555;    border-color:#555; }
  .cat-filter-btn[data-cat="주민센터"].active { background:#F05A22; border-color:#F05A22; }
  .cat-filter-btn[data-cat="문화재단"].active { background:#9B59B6; border-color:#9B59B6; }
  .cat-filter-btn[data-cat="시설공단"].active { background:#E91E8C; border-color:#E91E8C; }
  .cat-filter-btn[data-cat="유관기관"].active { background:#27AE60; border-color:#27AE60; }

  /* ── 지도 핀 라벨 ── */
  .map-label {
    background: transparent !important;
    display: flex !important; align-items: center !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    font-family: 'Noto Sans KR', sans-serif !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    color: #1A1A1A !important;
    white-space: nowrap !important;
    max-width: none !important;
    overflow: visible !important;
    text-overflow: clip !important;
    text-align: center !important;
    line-height: 1.25 !important;
    text-shadow: 1px 1px 0 #fff, -1px 1px 0 #fff, 1px -1px 0 #fff, -1px -1px 0 #fff,
                 0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff !important;
    pointer-events: none !important;
  }
   .map-label::before { display: none !important; }

  .map-label-wrap {
    display: inline-flex;
    align-items: center;
    gap: 0;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(232,232,228,0.9);
    box-shadow: 0 1px 5px rgba(0,0,0,0.08);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.95);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.12);
  }
  /* 지도 라벨의 상태 아이콘은 한눈에 보이도록 크게 표시 */
  .map-label-wrap .status-dot {
    width: 15px;
    height: 15px;
    border-width: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.16);
  }
  .status-working-dot { background:#27AE60; }
  .status-upcoming-dot { background:#F4C542; }
  .status-ended-dot { background:#666; }
  .status-off-dot { background:#E74C3C; }
  .label-text {
    font-size: 13px;
    font-weight: 800;
    color: #1A1A1A;
    white-space: nowrap;
  }

  .legend-box { z-index: 199;
    position: fixed;
    left: 50%;
    top: calc(var(--safe-top) + 72px);
    bottom: auto;
    transform: translateX(-50%);
    z-index: 260;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    padding: 8px 14px;
    font-size: 11px;
    line-height: 1.2;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }
  .legend-title { font-weight: 800; color: var(--text); margin-right: 2px; }
  .legend-item { display:flex; align-items:center; gap:5px; color:var(--text-muted); font-weight:700; white-space:nowrap; }
  .legend-item .status-dot { width: 10px; height: 10px; flex-shrink: 0; }
  @media (max-width: 767px) {
    .legend-box {
      top: calc(var(--safe-top) + 72px);
      bottom: auto;
      max-width: calc(100vw - 24px);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .cat-filter     { max-width: calc(100vw - 16px); overflow-x:auto; }
  }
  /* ── 데스크탑 ── */
  @media (min-width: 768px) {
    .legend-box { left: calc(365px + (100vw - 365px) / 2); top: calc(var(--safe-top) + 72px); bottom: auto; }
    .fab-list { display: none; }
    .bottom-sheet {
      position: fixed; top: 54px; left: 0; bottom: 0; width: 365px; /* top은 JS에서 동적으로 */
      border-radius: 0; transform: none !important; box-shadow: none;
      border-right: 1px solid var(--border); border-top: none; max-height: none;
    }
    .sheet-handle { display: none; }
    #map { left: 365px; right: 0; top: 54px; }
    .header-inner { padding: 12px 24px; }
    .logo-text { font-size: 17px; }
    .detail-sheet {
      position: fixed;
      left: auto; right: 0; top: 54px; bottom: 0;
      width: 365px; border-radius: 0; max-height: none;
      padding-top: 0;
      border-left: 1px solid var(--border); box-shadow: none;
      transform: none !important;
      overflow-y: auto;
      overflow-x: hidden;
      display: none;
    }
    .detail-sheet.desktop-active {
      display: flex;
      flex-direction: column;
    }
    .detail-overlay { display: none !important; }
    .detail-handle { display: none; }
    #map.detail-open { right: 360px; }
  }


  /* ─────────────────────────────
     모바일 최적화 추가
     - 터치 영역 확대
     - 하단 시트/상세 팝업 가독성 개선
     - 전화 버튼 누르기 쉽게 확대
     ───────────────────────────── */
  @media (max-width: 767px) {
    html, body { touch-action: manipulation; }
    .header-inner { padding: 10px 12px; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; }
    .logo-text { font-size: 15px; }
    .search-bar input { font-size: 15px; padding: 10px 40px 10px 12px; }

    .legend-box {
      top: calc(var(--safe-top) + 66px) !important;
      padding: 7px 11px;
      gap: 8px;
      font-size: 11px;
      max-width: calc(100vw - 18px);
    }
    .legend-title { display: none; }
    .legend-item .status-dot { width: 11px; height: 11px; }

    .filter-bar {
      height: 42px;
      padding: 0 8px;
      gap: 6px;
      border-radius: 13px;
      max-width: calc(100vw - 16px);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    
    .cat-filter-btn {
      min-height: 32px;
      height: 32px;
      padding: 0 13px;
      border-radius: 10px;
      font-size: 13px;
      flex-shrink: 0;
    }
    .filter-dot { width: 9px; height: 9px; }

    .fab-list {
      right: 12px;
      bottom: calc(188px + var(--safe-bottom));
      padding: 12px 17px;
      font-size: 14px;
    }

    .bottom-sheet {
      max-height: 78vh;
      transform: translateY(calc(100% - 150px - var(--safe-bottom)));
      border-radius: 22px 22px 0 0;
    }
    .bottom-sheet.expanded { transform: translateY(0); }
    .bottom-sheet.collapsed { transform: translateY(calc(100% - 60px - var(--safe-bottom))); }
    .sheet-handle-area { padding: 14px 16px 0; }
    .sheet-handle { width: 42px; height: 5px; }
    .sheet-title { font-size: 16px; }
    .store-item { padding: 14px 16px; }
    .store-name { font-size: 15px; }
    .store-address { font-size: 13px; }
    .store-meta { font-size: 12px; flex-wrap: wrap; gap: 7px 12px; }

    .detail-sheet {
      max-height: 88vh;
      border-radius: 24px 24px 0 0;
    }
    .detail-header { min-height: 68px; padding: 0 14px; }
    .detail-store-name { font-size: 19px; }
    .detail-close { width: 38px; height: 38px; font-size: 16px; }
    .detail-body { padding: 10px 14px 4px; }
    .detail-row { gap: 10px; padding: 14px 0; font-size: 15px; }
    .detail-icon { font-size: 18px; width: 23px; }
    .detail-label { width: 58px; font-size: 13px; }
    .detail-value { font-size: 15px; }

    .staff-tags { gap: 8px; }
    .staff-tag {
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    a.staff-tag {
      color: var(--text);
      -webkit-tap-highlight-color: rgba(240,90,34,0.18);
    }
    a.staff-tag:active {
      transform: scale(0.98);
      background: #EDEDEA;
    }
    .staff-tag.leader-tag { color: #C9302C; }
    .staff-call-hint { font-size: 12px; margin-left: 3px; }
    .staff-tag .leader-svg, .staff-tag .leader-svg svg { width: 16px; height: 16px; }

    .detail-actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--surface) 78%, rgba(255,255,255,0));
      padding: 10px 14px calc(12px + var(--safe-bottom));
    }
    .btn {
      min-height: 48px;
      font-size: 15px;
      border-radius: 14px;
    }

    .map-label { font-size: 12px !important; }
    .map-label-wrap {
      gap: 5px;
      padding: 3px 7px;
      max-width: 74vw;
    }
    .map-label-wrap .status-dot { width: 16px; height: 16px; }
    .label-text {
      font-size: 12px;
      max-width: 58vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .leaflet-popup-content { margin: 12px 14px !important; }
    .group-store-card { padding: 12px; border-radius: 12px; }
    .group-store-name { font-size: 14px; }
    .group-store-meta { font-size: 12px; }
  }



  /* ─────────────────────────────
     모바일 전용 클린 버전
     - 모바일에서는 범례/필터 숨김
     - 지도 라벨 상태점 숨김
     - 상세팝업 헤더를 구분색으로 꽉 채움
     ───────────────────────────── */
  @media (max-width: 767px) {
    .cat-filter,
    .status-legend,
    .legend-box {
      display: none !important;
    }

    /* 모바일 지도 라벨: 상태점 + 사업장명만 간단히 */
    .map-label-wrap {
      gap: 5px !important;
      padding: 3px 8px !important;
      background: rgba(255,255,255,0.92) !important;
    }
    .label-text {
      font-size: 12px !important;
      max-width: 56vw !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
    }

    /* 상세팝업: 상단 컬러 영역을 꽉 차게 */
    .detail-sheet {
      overflow: hidden !important;
      padding-top: 0 !important;
      border-radius: 24px 24px 0 0 !important;
      background: var(--surface) !important;
    }
    .detail-handle {
      display: none !important;
    }
    .detail-header {
      min-height: 86px !important;
      padding: 18px 16px 16px !important;
      border-radius: 24px 24px 0 0 !important;
      display: grid !important;
      grid-template-columns: auto 1fr auto !important;
      align-items: center !important;
      gap: 10px !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08) !important;
    }
    .detail-cat-badge {
      background: rgba(255,255,255,0.22) !important;
      color: #fff !important;
      border: 1px solid rgba(255,255,255,0.18) !important;
      padding: 5px 11px !important;
      font-size: 12px !important;
      border-radius: 999px !important;
    }
    .detail-store-name {
      color: #fff !important;
      font-size: 20px !important;
      font-weight: 800 !important;
      line-height: 1.25 !important;
      word-break: keep-all !important;
    }
    .detail-close {
      width: 42px !important;
      height: 42px !important;
      background: rgba(255,255,255,0.22) !important;
      color: #fff !important;
      font-size: 18px !important;
      border-radius: 50% !important;
    }
    .detail-body {
      padding: 12px 14px 4px !important;
    }

    /* 범례/필터 제거 후 목록 버튼 위치 정리 */
    .fab-list {
      bottom: calc(166px + var(--safe-bottom)) !important;
    }
  }


  /* ─────────────────────────────
     모바일 상세팝업 스크롤/하단 여백 수정 v3
     - 팝업 전체는 화면 안에 고정
     - 내용만 세로 스크롤
     - 하단 버튼 아래 빈 공간 제거
     ───────────────────────────── */
  @media (max-width: 767px) {
    .detail-overlay.show {
      display: block !important;
      background: rgba(0,0,0,0.38) !important;
    }

    .detail-sheet {
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      top: auto !important;
      height: calc(100dvh - 64px) !important;
      max-height: calc(100dvh - 64px) !important;
      min-height: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
      background: var(--surface) !important;
      border-radius: 24px 24px 0 0 !important;
      padding-bottom: 0 !important;
      box-shadow: 0 -6px 28px rgba(0,0,0,0.18) !important;
    }

    @supports not (height: 100dvh) {
      .detail-sheet {
        height: calc(100vh - 64px) !important;
        max-height: calc(100vh - 64px) !important;
      }
    }

    .detail-sheet.show {
      transform: translateY(0) !important;
    }

    .detail-header {
      flex: 0 0 auto !important;
      border-radius: 24px 24px 0 0 !important;
      margin: 0 !important;
    }

    .detail-body {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior: contain !important;
      padding: 12px 14px 12px !important;
      background: var(--surface) !important;
    }

    .detail-actions {
      flex: 0 0 auto !important;
      position: relative !important;
      bottom: auto !important;
      left: auto !important;
      right: auto !important;
      background: var(--surface) !important;
      padding: 10px 14px max(12px, var(--safe-bottom)) !important;
      margin: 0 !important;
      border-top: 1px solid var(--border) !important;
      box-shadow: 0 -4px 14px rgba(0,0,0,0.04) !important;
    }

    .detail-actions::after {
      content: none !important;
      display: none !important;
    }

    .btn {
      min-height: 48px !important;
    }
  }


  /* ─────────────────────────────
     모바일 목록 하단 빈공간 제거 v4
     - 검색 결과가 적을 때 하단시트가 화면을 크게 덮지 않도록 자동 높이
     - 결과가 많을 때만 목록 영역 내부 스크롤
     ───────────────────────────── */
  @media (max-width: 767px) {
    .bottom-sheet {
      height: auto !important;
      min-height: 0 !important;
      max-height: min(64dvh, 520px) !important;
      display: block !important;
      padding-bottom: var(--safe-bottom) !important;
      overflow: hidden !important;
      border-radius: 22px 22px 0 0 !important;
    }

    @supports not (max-height: 64dvh) {
      .bottom-sheet { max-height: 64vh !important; }

/* ── 현재 시간 기준 근무 상태 계산 ── */
function timeToMin(t) {
  if (!t || !/^\d{1,2}:\d{2}$/.test(String(t))) return Number.POSITIVE_INFINITY;
  if (t === '24:00') return 24 * 60;
  const [h, m] = String(t).split(':').map(Number);
  return h * 60 + m;
}
function getNowMin() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}
function getTodayIndex() {
  return String(new Date().getDay()); // 0=일, 1=월 ... 6=토
}
function normalizeTimeText(t) {
  return (t || '').replace('∼', '~').replace(/\s/g, '');
}
function splitTime(t) {
  const [start, end] = normalizeTimeText(t).split('~');
  return { start, end };
}
function getStoreShifts(store) {
  // Sheet1 기반 주간 스케줄이 있으면 오늘 요일의 근무자만 시간대별로 묶어서 표시
  if (store.weekly && store.weekly.length) {
    const today = getTodayIndex();
    const groups = {};
    store.weekly.forEach(person => {
      const time = person.days && person.days[today];
      if (!time) return;
      const { start, end } = splitTime(time);
      const label = (person.labels && person.labels[today]) || '전일';
      // 김영삼도서관은 미화/주차 원본 유지, 그 외는 시간대로 오전/오후 변환
        const displayLabel = (store.name === '김영삼도서관')
          ? label
          : (() => {
              const sh = timeToMin(start);
              if (sh < 12*60) return '오전';
              if (sh < 17*60) return '오후';
              return '저녁';
            })();
        const key = `${displayLabel}|${start}|${end}`;
      if (!groups[key]) groups[key] = { label, start, end, staff: [] };
      groups[key].staff.push({ name: person.name, leader: !!person.leader });
    });
    return Object.values(groups).sort((a, b) => timeToMin(a.start) - timeToMin(b.start));
  }
  return store.shifts || [];
}

function getAllDisplayShifts(store) {
  // 근무자 목록은 현재 근무 여부와 관계없이 전체 명단을 표시
  // 전화번호는 weekly 데이터에서 이름 기준으로 매칭
  const peopleByName = new Map();
  (store.weekly || []).forEach(p => {
    if (!p || !p.name) return;
    peopleByName.set(p.name, {
      leader: !!p.leader,
      phone: p.phone || ''
    });
  });

  return (store.shifts || []).map(sh => ({
    ...sh,
    staff: (sh.staff || []).map(p => {
      const base = typeof p === 'string' ? { name: p } : p;
      const extra = peopleByName.get(base.name) || {};
      return {
        ...base,
        leader: !!base.leader || !!extra.leader,
        phone: base.phone || extra.phone || ''
      };
    })
  }));
}
const DAY_NAMES = ['일','월','화','수','목','금','토'];
// 월(1)~일(0) 기준으로 연속 요일 묶기
function formatDayList(dayNums) {
  const set = new Set(dayNums.map(Number));
  if (!set.size) return '';
  const ORDER = [1,2,3,4,5,6,0]; // 월화수목금토일
  const nums = ORDER.filter(d => set.has(d));
  if (!nums.length) return '';
  const groups = [];
  let si = 0;
  while (si < nums.length) {
    let ei = si;
    // ei+1이 ei의 바로 다음 ORDER 위치인지 확인
    while (ei + 1 < nums.length && ORDER.indexOf(nums[ei+1]) === ORDER.indexOf(nums[ei]) + 1) ei++;
    const dayS = nums[si], dayE = nums[ei];
    const span = ei - si;
    if (span === 0) groups.push(DAY_NAMES[dayS]);
    else if (span === 1) groups.push(DAY_NAMES[dayS] + DAY_NAMES[dayE]);
    else groups.push(DAY_NAMES[dayS] + '~' + DAY_NAMES[dayE]);
    si = ei + 1;
  }
  return groups.join(', ');
}
function getScheduleGroups(store) {
  // 전체 주간 근무스케줄: 같은 근무구분/시간은 요일을 묶어서 표시
  if (store.weekly && store.weekly.length) {
    const groups = {};
    store.weekly.forEach(person => {
      Object.entries(person.days || {}).forEach(([day, time]) => {
        if (!time) return;
        const { start, end } = splitTime(time);
        const label = (person.labels && person.labels[day]) || '전일';
        // 김영삼도서관은 미화/주차, 신청사는 오전/오후/주말/푸드코트 원본 라벨 유지
        const displayLabel = (store.name === '김영삼도서관' || store.name === '신청사')
          ? label
          : (() => {
              const sh = timeToMin(start);
              if (sh < 12*60) return '오전';
              if (sh < 17*60) return '오후';
              return '저녁';
            })();
        const key = `${displayLabel}|${start}|${end}`;
        if (!groups[key]) groups[key] = { label: displayLabel, start, end, days: new Set() };
        groups[key].days.add(Number(day));
      });
    });
    return Object.values(groups)
      .map(g => ({ ...g, dayText: formatDayList([...g.days]) }))
      .sort((a, b) => {
        if (store.name === '신청사') {
          const order = { '오전': 1, '오후': 2, '주말': 3, '푸드코트': 4 };
          const oa = order[a.label] || 99;
          const ob = order[b.label] || 99;
          if (oa !== ob) return oa - ob;
        }
        const ORDER = [1,2,3,4,5,6,0];
        const firstA = Math.min(...[...a.days].map(d => ORDER.indexOf(d)));
        const firstB = Math.min(...[...b.days].map(d => ORDER.indexOf(d)));
        return firstA === firstB ? timeToMin(a.start) - timeToMin(b.start) : firstA - firstB;
      });
  }
  return (store.shifts || []).map(sh => ({ label: sh.label, start: sh.start, end: sh.end, dayText: '상시' }));
}
function getActiveShifts(store, shifts = null) {
  const now = getNowMin();
  const targetShifts = shifts || getStoreShifts(store);
  return targetShifts.filter(sh => now >= timeToMin(sh.start) && now < timeToMin(sh.end));
}
function isAnyWorking(store) {

function getStoreStatus(store) {

  if (getActiveShifts(store, shifts).length) return { key: 'working', label: '근무중', dotClass: 'status-working-dot', textClass: 'status-open' };
  if (shifts.some(sh => Number.isFinite(timeToMin(sh.start)) && timeToMin(sh.start) > now)) return { key: 'upcoming', label: '근무예정', dotClass: 'status-upcoming-dot', textClass: 'status-upcoming-text' };
  return { key: 'ended', label: '근무종료', dotClass: 'status-ended-dot', textClass: 'status-closed' };
}

function createMixedIcon(group, isActive = false) {
  // 같은 위치에 서로 다른 구분이 섞인 경우 라벨 배경을 그라데이션으로 표시
  const colors = [...new Set((group || []).map(s => catColor(s.cat)))];
  if (colors.length <= 1) return createIcon(group, isActive);
  const gradient = colors.length === 2
    ? `linear-gradient(135deg, ${colors[0]} 0 50%, ${colors[1]} 50% 100%)`
    : `conic-gradient(${colors.map((c, i) => `${c} ${(i / colors.length) * 100}% ${((i + 1) / colors.length) * 100}%`).join(', ')})`;
  const text = getMarkerLabelText(group);
  return L.divIcon({
    html: `<div class="store-badge-marker ${isActive ? 'active' : ''}" style="background:${gradient};"><span class="store-marker-text">${text}</span></div>`,
    className: '',
    iconSize: [1, 1],
    iconAnchor: [0, 0],
    popupAnchor: [0, -18]
  });
}

function getMarkerIconForGroup(group, isActive = false) {
  const visible = getVisibleGroup(group || []);
  const target = visible.length ? visible : (group || []);
  const cats = [...new Set(target.map(s => s.cat))];
  return cats.length > 1 ? createMixedIcon(target, isActive) : createIcon(target, isActive);
}

const DISPLAY_OFFSET_BY_NAME = {};
function getGroupKey(store) {

map.on('click', () => { if (sheetState === 'expanded') setSheetState('peek'); });


/* ── 필터 ── */
const activeCats = new Set(); // 비어 있으면 전체 표시, 값이 있으면 선택된 구분만 표시

function refreshCatButtons() {
  document.querySelectorAll('.cat-filter-btn').forEach(b => {
    const cat = b.dataset.cat;
    const isActive = cat === '전체' ? activeCats.size === 0 : activeCats.has(cat);
    b.classList.toggle('active', isActive);
  });
}

function filterCat(btn) {
  const cat = btn.dataset.cat;
  if (cat === '전체') {
    activeCats.clear();
  } else {
    if (activeCats.has(cat)) activeCats.delete(cat);
    else activeCats.add(cat);
  }
  refreshCatButtons();
  applyFilters();
}
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filteredStores = stores.filter(s => {
    const matchCat = activeCats.size === 0 || activeCats.has(s.cat);
    const matchSearch = !q || s.branch.includes(q) || s.name.includes(q) ||
      s.address.includes(q) || s.cat.includes(q) || s.manager.includes(q) ||
      getStoreShifts(s).some(sh => sh.staff.some(st => (typeof st === 'string' ? st : st.name).includes(q))) ||
      (s.weekly || []).some(w => w.name && w.name.includes(q)) ||
      (q === '근무중' && getStoreStatus(s).key === 'working') ||
      (q === '근무예정' && getStoreStatus(s).key === 'upcoming') ||
      (q === '근무종료' && getStoreStatus(s).key === 'ended') ||
      (q === '휴무' && getStoreStatus(s).key === 'off');
    return matchCat && matchSearch;
  });
  renderList();
  updateMarkers();
}
function updateMarkers() {
  const visibleIds = new Set(filteredStores.map(s => s.id));
  const processed = new Set();
  Object.values(markers).forEach(marker => {
    if (!marker || processed.has(marker)) return;
    processed.add(marker);
    const group = marker.storeGroup || [];
    const shouldShow = group.some(s => visibleIds.has(s.id));
    if (shouldShow) {
      marker.addTo(map);
      marker.setIcon(getMarkerIconForGroup(group, group.some(s => s.id === activeId)));
    } else {
      marker.remove();
    }
  });
}
/* ── 검색 ── */
document.getElementById('searchInput').addEventListener('input', e => {
  applyFilters();
  if (e.target.value.trim()) setSheetState('expanded');
});

/* ── 상세 팝업 ── */
function sanitizeTel(phone) {
  return String(phone || '').replace(/[^0-9+]/g, '');
}
function escapeHtml(value) {
  return String(value || '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

function openDetail(id) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  const c = CAT[s.cat];
  const todayShifts = getStoreShifts(s);
  const activeShifts = getActiveShifts(s, todayShifts);
  const working = activeShifts.length > 0;

  document.getElementById('dName').textContent = s.name;
  document.getElementById('dCatBadge').textContent = c ? c.label : s.cat;
  const headerEl = document.getElementById('dHeader');
  headerEl.style.background = c ? c.color : '#F05A22';
  document.getElementById('dManager').textContent = s.manager || '-';
  document.getElementById('dAddress').textContent = s.address;

  // 근무상태
  const detailStatus = getStoreStatus(s);
  let statusText = detailStatus.label;
  if (detailStatus.key === 'working' && activeShifts.length === 1 && activeShifts[0].label !== '전일') {
    statusText = `${activeShifts[0].label} 근무중`;
  }
  document.getElementById('dStatus').innerHTML = `<span class="${detailStatus.textClass}">${statusText}</span>`;
  document.getElementById('dType').textContent = s.cat;

  // ── B 카드형 근무 스케줄 ──
  const todayDay = new Date().getDay(); // 0=일,1=월,...
  const DAY_LABELS = ['일','월','화','수','목','금','토'];
  // weekly 데이터로 근무자 카드 렌더
  const weekly = s.weekly || [];
  let shiftsHtml;
  if (weekly.length === 0) {
    shiftsHtml = '<span style="color:var(--text-muted);font-size:13px;">등록된 근무자가 없습니다.</span>';
  } else {
    // ── 근무자를 시간대/팀으로 그룹핑 ──
    const isKimyoungsam = s.name === '김영삼도서관';
    const groupMap = {};
    weekly.forEach((person) => {
      // 그룹 키: 김영삼도서관은 label(미화/주차), 그 외는 대표 시간대
      // shift_label이 있으면 그걸 그룹키로 사용
      const personLabel = person.shift_label || '';
      let groupKey;
      if (isKimyoungsam) {
        // 김영삼도서관: 미화/주차 + 오전/오후 조합으로 그룹 표시
        const firstDay = Object.keys(person.days || {})[0];
        const rawLabel = firstDay && person.labels ? person.labels[firstDay] : '';
        const typeLabel = person.shift_type || '';
        const timeLabel = rawLabel || personLabel || '';
        groupKey = (typeLabel && timeLabel) ? `${typeLabel}-${timeLabel}` : (typeLabel || timeLabel || '기타');
      } else if (personLabel) {
        // 신청사는 오전/오후/주말/푸드코트 4개 그룹으로 표시
        groupKey = (s.name === '신청사') ? personLabel : (personLabel + '팀');
      } else {
        const firstDay = Object.keys(person.days || {})[0];
        const firstTime = firstDay ? person.days[firstDay] : null;
        if (firstTime) {
          const [st] = firstTime.split('~');
          const stMin = timeToMin(st);
          groupKey = stMin < 12*60 ? '오전팀' : stMin < 17*60 ? '오후팀' : '저녁팀';
        } else { groupKey = '기타'; }
      }
      if (!groupMap[groupKey]) groupMap[groupKey] = [];
      groupMap[groupKey].push(person);
    });

    // 그룹 내 정렬: 반장 맨위, 나머지 가나다순
    Object.keys(groupMap).forEach(k => {
      groupMap[k].sort((a, b) => {
        if (a.leader && !b.leader) return -1;
        if (!a.leader && b.leader) return 1;
        return (a.name || '').localeCompare(b.name || '', 'ko');
      });
    });
    const groupOrder = isKimyoungsam
      ? ['미화-오전','미화-오후','주차-오전','주차-오후','미화','주차']
      : (s.name === '신청사'
          ? ['오전','오후','주말','푸드코트','기타']
          : ['오전팀','오후팀','주말팀','저녁팀','기타']);
    const groupColors = {
      '오전팀':  { hdr: '#FFF0EB', hdrText: '#C94415', dot: '#F05A22' },
      '오후팀':  { hdr: '#E6F1FB', hdrText: '#0C447C', dot: '#185FA5' },
      '저녁팀':  { hdr: '#F5EEFB', hdrText: '#4A1880', dot: '#9B59B6' },
      '미화-오전': { hdr: '#FFF0EB', hdrText: '#C94415', dot: '#F05A22' },
      '미화-오후': { hdr: '#FFE8F1', hdrText: '#B0185B', dot: '#E91E8C' },
      '주차-오전': { hdr: '#E6F1FB', hdrText: '#0C447C', dot: '#185FA5' },
      '주차-오후': { hdr: '#F5EEFB', hdrText: '#4A1880', dot: '#9B59B6' },
      '미화':    { hdr: '#FFF0EB', hdrText: '#C94415', dot: '#F05A22' },
      '주차':    { hdr: '#E6F1FB', hdrText: '#0C447C', dot: '#185FA5' },
      '오전':    { hdr: '#FFF0EB', hdrText: '#C94415', dot: '#F05A22' },
      '오후':    { hdr: '#E6F1FB', hdrText: '#0C447C', dot: '#185FA5' },
      '주말':    { hdr: '#F5EEFB', hdrText: '#4A1880', dot: '#9B59B6' },
      '푸드코트': { hdr: '#E8F8EF', hdrText: '#087A3C', dot: '#27AE60' },
      '기타':    { hdr: '#F2F2F0', hdrText: '#555',    dot: '#888' },
    };
    const groupSections = groupOrder.filter(k => groupMap[k]).map(groupKey => {
      const gc = groupColors[groupKey] || groupColors['기타'];
      const memberCards = groupMap[groupKey].map((person, pi) => {
      // 그룹마다 pi가 0부터 다시 시작해서 오전/오후 구성원의 tooltip id가 중복되던 문제 수정
      const safeGroupKey = String(groupKey || 'group').replace(/[^가-힣a-zA-Z0-9_-]/g, '_');
      const cardId = `wcard_${id}_${safeGroupKey}_${pi}`;
      const tipId  = `wtip_${id}_${safeGroupKey}_${pi}`;
      // 근무 요일 set
      const workDays = Object.keys(person.days).map(Number);
      const isWorkingNow = workDays.includes(todayDay) && (() => {
        const t = person.days[String(todayDay)];
        if (!t) return false;
        const [st, en] = t.split('~');
        const now = new Date().getHours()*60 + new Date().getMinutes();
        return now >= timeToMin(st) && now < timeToMin(en);
      })();
      const leaderBadge = person.leader
        ? `<span style="font-size:9px;color:var(--text-muted);font-weight:400;margin-left:3px;">반장</span>`
        : '';
      const nameStr = `${person.leader ? '★ ' : ''}${escapeHtml(person.name)}`;
      const safePhone = sanitizeTel(person.phone || '');
      // 오늘 근무시간 뱃지
      const todayTime = person.days[String(todayDay)] || null;
      const timeBadgeBg = isWorkingNow ? '#E8F8EF' : (todayTime ? '#F2F2F0' : 'transparent');
      const timeBadgeColor = isWorkingNow ? '#059142' : '#666';
      const timeBadgeText = todayTime
        ? (isWorkingNow ? `● ${todayTime}` : todayTime)
        : '비번';
      const cardBg = isWorkingNow ? '#FFF8F6' : 'var(--color-background-primary, #fff)';
      const cardBorder = isWorkingNow ? '#F4C4B0' : 'var(--border, #E8E8E4)';
      // 요일 버튼들
      const dayBtns = DAY_LABELS.map((dl, di) => {
        const hasWork = workDays.includes(di);
        const isToday = di === todayDay;
        const timeForDay = person.days[String(di)] || null;
        let bg, color, border, fw;
        if (hasWork) {
          bg = '#F05A22'; color = '#fff'; fw = '700';
          border = isToday ? '2.5px solid #185FA5' : '2px solid transparent';
        } else {
          bg = '#F2F2F0'; color = '#bbb'; fw = isToday ? '700' : '400';
          border = isToday ? '2.5px solid #185FA5' : '2px solid transparent';
        }
        const todayAccent = isToday
          ? 'box-shadow:0 0 0 2px rgba(24,95,165,.25), 0 2px 6px rgba(24,95,165,.35); transform:translateY(-1px);'
          : '';
        const onclick = timeForDay
          ? `onclick="(function(){var t=document.getElementById('${tipId}');t.textContent='${dl}: '+decodeURIComponent('${encodeURIComponent(timeForDay)}');t.style.opacity='1';setTimeout(function(){t.style.opacity='0'},2000);})()"` : '';
        return `<span ${onclick} style="background:${bg};color:${color};font-size:11px;font-weight:${fw};padding:3px 7px;border-radius:6px;border:${border};${todayAccent}cursor:${timeForDay?'pointer':'default'};user-select:none;transition:opacity .15s, transform .15s, box-shadow .15s;">${dl}</span>`;
      }).join('');
      const card = `
        <div style="border:1px solid ${cardBorder};border-radius:10px;padding:9px 11px;background:${cardBg};margin-bottom:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:13px;font-weight:600;color:var(--text, #1A1A1A);">${nameStr}${leaderBadge}</span>
              ${safePhone ? `<a href="tel:${safePhone}" onclick="if(navigator.vibrate)navigator.vibrate(30)" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#E8F8EF;color:#059142;font-size:13px;text-decoration:none;" title="${escapeHtml(person.name)} 통화">📞</a>` : ''}
            </div>
            <span style="background:${timeBadgeBg};color:${timeBadgeColor};font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;">${timeBadgeText}</span>
          </div>
          <div style="display:flex;gap:3px;margin-bottom:5px;">${dayBtns}</div>
          <div id="${tipId}" style="font-size:11px;color:#555;opacity:0;transition:opacity .3s;height:14px;"></div>
        </div>`;
        return card;
      }).join('');
      return `<div style="margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid #E8E8E4;">
          <span style="width:8px;height:8px;border-radius:50%;background:${gc.dot};flex-shrink:0;display:inline-block;"></span>
          <span style="font-size:12px;font-weight:600;color:${gc.hdrText};">${groupKey}</span>
          <span style="font-size:11px;color:#aaa;">${groupMap[groupKey].length}명</span>
        </div>
        ${memberCards}
      </div>`;
    }).join('');
    shiftsHtml = groupSections || '<span style="color:var(--text-muted);font-size:13px;">등록된 근무자가 없습니다.</span>';
  }
  document.getElementById('dShifts').innerHTML = shiftsHtml;

  // 전체 근무스케줄
  const scheduleGroups = getScheduleGroups(s);
  const scheduleHtml = scheduleGroups.length ? scheduleGroups.map(sc => {
    const labelBadge = sc.label && sc.label !== '전일'
      ? `<span style="font-size:11px;font-weight:400;padding:2px 8px;border-radius:10px;background:#FFF0EB;color:#C94415;flex-shrink:0;">${sc.label}</span>`
      : '';
    return `
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px;font-size:13px;line-height:1.5;">
        <span style="font-weight:400;color:var(--text);min-width:44px;">${sc.dayText}</span>
        ${labelBadge}
        <span style="font-weight:400;color:var(--text);">${sc.start} ~ ${sc.end}</span>
      </div>`;
  }).join('') : '<span style="color:var(--text-muted);font-size:13px;">등록된 근무스케줄이 없습니다.</span>';
  document.getElementById('dSchedule').innerHTML = scheduleHtml;

  // 길찾기 버튼
  document.getElementById('dTmapBtn').onclick = () => {
    const appUrl = `tmap://route?goalname=${encodeURIComponent(s.branch)}&goaly=${s.lat}&goalx=${s.lng}`;
    const webUrl = `https://tmap.life/route?goalname=${encodeURIComponent(s.branch)}&goaly=${s.lat}&goalx=${s.lng}`;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);
    if (isIOS || isAndroid) {
      window.location.href = appUrl;
      setTimeout(() => window.open(webUrl, '_blank'), 1500);
    } else {
      window.open(webUrl, '_blank');
    }
  };
  document.getElementById('dNaverBtn').onclick = () => {
    const appUrl = `nmap://route/car?dlat=${s.lat}&dlng=${s.lng}&dname=${encodeURIComponent(s.branch)}&appname=saeupjangmap`;
    const webUrl = `https://map.naver.com/v5/directions/-/-/-/car?c=${s.lng},${s.lat},15,0,0,0,dh&destination=${encodeURIComponent(s.branch)}`;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);
    if (isIOS || isAndroid) {
      window.location.href = appUrl;
      setTimeout(() => window.open(webUrl, '_blank'), 1500);
    } else {
      window.open(webUrl, '_blank');
    }
  };
  const isDesktop = window.innerWidth >= 768;
  if (isDesktop) {
    document.getElementById('detailSheet').classList.add('desktop-active');
    document.getElementById('map').classList.add('detail-open');
    map.invalidateSize();
  } else {
    document.getElementById('detailOverlay').classList.add('show');
    setTimeout(() => document.getElementById('detailSheet').classList.add('show'), 10);
  }
}
function closeDetail() {
  const isDesktop = window.innerWidth >= 768;
  if (isDesktop) {
    document.getElementById('detailSheet').classList.remove('desktop-active');
    document.getElementById('map').classList.remove('detail-open');
    map.invalidateSize();
  } else {
    document.getElementById('detailSheet').classList.remove('show');
    document.getElementById('detailOverlay').classList.remove('show');
  }
}
window.openDetail = openDetail;
</script>
</body>
</html>
